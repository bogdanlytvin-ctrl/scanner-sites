<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Crypto Sniper — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2.5rem;width:100%;max-width:370px}
    .brand{font-size:1.4rem;font-weight:700;color:#58a6ff;text-align:center;margin-bottom:1.8rem}
    .form-control{background:#21262d;border:1px solid #30363d;color:#e6edf3}
    .form-control:focus{background:#21262d;border-color:#58a6ff;color:#e6edf3;box-shadow:none}
    .btn-primary{background:#238636;border-color:#238636}
    .btn-primary:hover{background:#2ea043;border-color:#2ea043}
    .alert{background:#21262d;border-color:#f85149;color:#f85149;font-size:.9rem}
    .security-note{color:#484f58;font-size:.72rem;text-align:center;margin-top:1rem}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">🎯 Crypto Sniper Admin</div>

    {% with msgs = get_flashed_messages() %}{% if msgs %}
    <div class="alert mb-3">{% for m in msgs %}{{ m }}{% endfor %}</div>
    {% endif %}{% endwith %}

    <form method="POST" action="/login" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="mb-3">
        <label class="form-label text-muted small">Логін</label>
        <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
      </div>

      <div class="mb-3">
        <label class="form-label text-muted small">Пароль</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      {% if totp_required %}
      <div class="mb-3">
        <label class="form-label text-muted small">TOTP код (Google Authenticator) 🔐</label>
        <input type="text" name="totp_code" class="form-control"
               placeholder="123456" maxlength="6" inputmode="numeric"
               autocomplete="one-time-code" pattern="[0-9]{6}">
      </div>
      {% endif %}

      <button type="submit" class="btn btn-primary w-100 mt-1">Увійти</button>
    </form>

    <div class="security-note">
      Rate-limited · CSRF protected · Session 30min
      {% if totp_required %} · 2FA enabled{% endif %}
    </div>
  </div>
</body>
</html>
