<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplier Runner MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-card">
        <h1>Multiplier Runner</h1>

        <div class="status-grid">
          <div class="status-item">
            <span class="label">State</span>
            <span id="gameState" class="value state-idle">Idle</span>
          </div>
          <div class="status-item">
            <span class="label">Multiplier</span>
            <span id="multiplierValue" class="value">x1.00</span>
          </div>
          <div class="status-item">
            <span class="label">Progress</span>
            <span id="progressValue" class="value">0.00s</span>
          </div>
        </div>

        <div id="gameArea" class="game-area" aria-label="Game area">
          <div id="runner" class="runner" aria-hidden="true"></div>
        </div>

        <p id="finalResult" class="result">Final result: -</p>

        <div class="controls">
          <button id="startButton" class="btn btn-start">Start</button>
          <button id="stopButton" class="btn btn-stop" disabled>Stop</button>
          <button id="restartButton" class="btn btn-restart">Restart</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
